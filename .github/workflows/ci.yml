name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test (unit)
        run: go test ./...

      - name: verify seed packs
        run: |
          set -euo pipefail
          for d in packs/*/; do
            case "$(basename "$d")" in
              _*) continue ;;
            esac
            go run ./cmd/bugsim verify-pack "$d"
          done

  integration-docker:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache: true

      - name: docker version
        run: docker version

      - name: pre-pull runner image
        run: docker pull golang:1.26

      - name: integration tests
        run: go test ./internal/engine -run TestRunTests -v

  typescript-packs:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: pack contract — solutions pass, skeletons fail
        shell: bash
        run: |
          set -u
          fail=0
          for pack in ts-string-utils ts-list-utils ts-validate-input; do
            sol_work=$(mktemp -d)
            cp -R "packs/${pack}/skeleton/." "$sol_work/"
            cp -R "packs/${pack}/hidden_tests/." "$sol_work/"
            for src in packs/${pack}/solution/*; do
              cp "$src" "$sol_work/src/$(basename "$src")"
            done
            echo "== $pack: solution applied (must pass) =="
            if ! (cd "$sol_work" && node --test); then
              echo "FAIL: $pack solution did not pass its own hidden_tests"
              fail=1
            fi
            rm -rf "$sol_work"

            skel_work=$(mktemp -d)
            cp -R "packs/${pack}/skeleton/." "$skel_work/"
            cp -R "packs/${pack}/hidden_tests/." "$skel_work/"
            echo "== $pack: skeleton only (must fail) =="
            if (cd "$skel_work" && node --test > /dev/null 2>&1); then
              echo "FAIL: $pack skeleton accidentally passes hidden_tests"
              fail=1
            fi
            rm -rf "$skel_work"
          done
          exit $fail
